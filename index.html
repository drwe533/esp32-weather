<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESP32 Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 10px;
    }

    h1 { font-size: 22px; }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px;
      border-radius: 15px;
      width: 140px;
      max-width: 160px;
    }

    .value {
      font-size: 28px;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
    }

    .online { color: #22c55e; }
    .offline { color: #ef4444; }

    canvas {
      background: white;
      border-radius: 10px;
      margin-top: 20px;
      width: 100% !important;
      height: 250px !important;
    }
  </style>
</head>

<body>

<h1>📡 ESP32 Weather Dashboard</h1>

<div class="container">
  <div class="card">
    <h3>Температура</h3>
    <div class="value" id="temp">--</div>
  </div>

  <div class="card">
    <h3>Влажность</h3>
    <div class="value" id="hum">--</div>
  </div>
</div>

<div class="status" id="status">⏳ Подключение...</div>

<canvas id="chart"></canvas>

<script>
// Firebase
const firebaseConfig = {
  databaseURL: "https://esp32-weather-33490-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// данные графика
let labels = [];
let tempData = [];
let humData = [];

let lastUpdate = 0;

const ctx = document.getElementById('chart').getContext('2d');

// график
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [
      {
        label: 'Температура',
        borderColor: 'red',
        data: tempData,
        tension: 0.4
      },
      {
        label: 'Влажность',
        borderColor: 'blue',
        data: humData,
        tension: 0.4
      }
    ]
  },
  options: {
    animation: false,
    responsive: true,
    maintainAspectRatio: false,
    scales: {
      y: { beginAtZero: true }
    }
  }
});

// получение данных
db.ref("sensor").on("value", (snapshot) => {
  const data = snapshot.val();

  if (!data) return;

  // защита от null
  const temp = Number(data.temperature);
  const hum = Number(data.humidity);

  if (isNaN(temp) || isNaN(hum)) return;

  document.getElementById("temp").innerText = temp.toFixed(1);
  document.getElementById("hum").innerText = hum.toFixed(1);

  lastUpdate = Date.now();

  const time = new Date().toLocaleTimeString();

  labels.push(time);
  tempData.push(temp);
  humData.push(hum);

  if (labels.length > 20) {
    labels.shift();
    tempData.shift();
    humData.shift();
  }

  chart.update('none');
});

// статус устройства
setInterval(() => {
  const status = document.getElementById("status");

  if (Date.now() - lastUpdate < 10000) {
    status.innerText = "🟢 Данные есть ";
    status.className = "status online";
  } else {
    status.innerText = "🔴 Устройство ждет данные ";
    status.className = "status offline";
  }
}, 2000);

</script>

</body>
</html>
