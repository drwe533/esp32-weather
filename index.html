<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESP32 Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- адаптация под телефон -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 10px;
    }

    h1 {
      font-size: 22px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px;
      border-radius: 15px;
      width: 140px;
      flex: 1;
      max-width: 160px;
    }

    .value {
      font-size: 28px;
    }

    canvas {
      background: white;
      border-radius: 10px;
      margin-top: 20px;
      width: 100% !important;
      height: 300px !important;
    }
  </style>
</head>

<body>

<h1>📡 ESP32 Weather</h1>

<div class="container">
  <div class="card">
    <h3>Температура</h3>
    <div class="value" id="temp">--</div>
  </div>

  <div class="card">
    <h3>Влажность</h3>
    <div class="value" id="hum">--</div>
  </div>
</div>

<canvas id="chart"></canvas>

<script>
const firebaseConfig = {
  databaseURL: "https://esp32-weather-33490-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let labels = [];
let tempData = [];
let humData = [];

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [
      {
        label: 'Температура',
        borderColor: 'red',
        data: tempData,
        tension: 0.3
      },
      {
        label: 'Влажность',
        borderColor: 'blue',
        data: humData,
        tension: 0.3
      }
    ]
  },
  options: {
    animation: false,
    responsive: true,
    scales: {
      y: {
        beginAtZero: true
      }
    }
  }
});

// обновление ТОЛЬКО последней точки (без лагов)
db.ref("sensor").on("value", (snapshot) => {
  const data = snapshot.val();
  if (!data) return;

  document.getElementById("temp").innerText = data.temperature;
  document.getElementById("hum").innerText = data.humidity;

  let time = new Date().toLocaleTimeString();

  if (labels.length > 20) {
    labels.shift();
    tempData.shift();
    humData.shift();
  }

  labels.push(time);
  tempData.push(data.temperature);
  humData.push(data.humidity);

  chart.update('none'); // без анимации = плавно
});
</script>

</body>
</html>
